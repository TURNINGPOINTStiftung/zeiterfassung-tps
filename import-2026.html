const fbRef = firebase.database().ref('zeiterfassung');
const log = document.getElementById('log');
const statusEl = document.getElementById('status');

function addLog(msg, cls='') {
  log.innerHTML += `<span class="${cls}">${msg}</span>\n`;
  log.scrollTop = log.scrollHeight;
}

async function runImport() {
  document.getElementById('btn').disabled = true;
  statusEl.textContent = '⏳ Verbinde mit Firebase…';
  log.innerHTML = '';
  addLog('Verbinde mit Firebase…', 'info');

  try {
    await firebase.auth().signInAnonymously();
    addLog('✓ Authentifiziert', 'ok');

    const snap = await fbRef.once('value');
    const data = snap.val();
    if (!data || !Array.isArray(data.users) || !data.users.length) {
      addLog('✗ Keine Nutzerdaten in Firebase gefunden. App muss zuerst geöffnet werden.', 'err');
      statusEl.textContent = '✗ Fehler';
      document.getElementById('btn').disabled = false;
      return;
    }
    addLog(`✓ ${data.users.length} Nutzer geladen`, 'ok');

    if (!data.entries) data.entries = {};
    let imp = 0, skip = 0, noUser = [];

    for (const rec of HIST_IMPORT) {
      const nm = rec.n.toLowerCase();
      const user = data.users.find(u => {
        const un = (u.name || '').toLowerCase();
        return un === nm || nm.split(' ').every(p => un.includes(p)) || un.split(' ').every(p => nm.includes(p));
      });
      if (!user) {
        if (!noUser.includes(rec.n)) noUser.push(rec.n);
        addLog(`  ⚠ Nicht gefunden: ${rec.n} (${rec.y}-${String(rec.m).padStart(2,'0')})`, 'warn');
        continue;
      }
      const k = `${user.id}_${rec.y}_${String(rec.m).padStart(2,'0')}`;
      const existing = data.entries[k];
      if (existing && existing.days) {
        const hasTimes = Object.values(existing.days).some(d => d && (d.b1von || d.b1bis || d.b2von));
        if (hasTimes) {
          addLog(`  ⏭ Übersprungen (bereits vorhanden): ${rec.n} ${rec.y}-${String(rec.m).padStart(2,'0')}`, 'warn');
          skip++; continue;
        }
      }
      data.entries[k] = { status: 'approved', days: rec.d };
      addLog(`  ✓ Importiert: ${rec.n} – ${['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'][rec.m-1]} ${rec.y}`, 'ok');
      imp++;
    }

    addLog('\nSpeichere in Firebase…', 'info');
    statusEl.textContent = '⏳ Speichere…';
    await fbRef.set(data);
    addLog('✓ Gespeichert!', 'ok');

    const summary = `\n✅ Import abgeschlossen!\n   Importiert: ${imp} Monate\n   Übersprungen: ${skip} (bereits vorhanden)\n   Nicht gefunden: ${noUser.length ? noUser.join(', ') : 'Keine'}`;
    addLog(summary, imp > 0 ? 'ok' : 'warn');
    statusEl.textContent = imp > 0 ? `✅ ${imp} Monate importiert` : `⚠ 0 Monate importiert`;

    if (noUser.length) {
      addLog('\n⚠ Nicht gefundene Personen sind möglicherweise noch nicht im System angelegt.', 'warn');
      addLog('  Bitte zuerst die Mitarbeiter in der App anlegen, dann erneut importieren.', 'warn');
    }
  } catch(e) {
    addLog('✗ Fehler: ' + e.message, 'err');
    statusEl.textContent = '✗ Fehler';
    console.error(e);
    document.getElementById('btn').disabled = false;
  }
}
</script>
